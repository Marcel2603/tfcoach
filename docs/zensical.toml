[project]
site_name = "tfcoach"
site_url = "https://marcel2603.github.io/tfcoach/"
repo_url = "https://github.com/Marcel2603/tfcoach"
repo_name = "Marcel2603/tfcoach"
docs_dir = "pages"
extra_css = ["stylesheets/max_width.css"]
# autogenerated from gen-docs tool
nav = [
    { "Home" = "index.md" },
    { "Getting started" = [
        { "Getting started" = "getting-started/index.md" },
        { "Usage" = "getting-started/usage.md" },
        { "Configuration" = [
            { "Configuration" = "getting-started/configuration/index.md" },
            { "Where to configure" = "getting-started/configuration/where.md" },
            { "What to configure" = "getting-started/configuration/what.md" }
        ] }
    ] },
    { "Ideas" = "rule-ideas.md" },
    { "Rules" = [
        { "Overview" = "rules/index.md" },
        { "Core" = [
            { "core.avoid_null_provider" = "rules/core/avoid_null_provider.md" },
            { "core.avoid_type_in_name" = "rules/core/avoid_type_in_name.md" },
            { "core.enforce_parameter_order" = "rules/core/enforce_parameter_order.md" },
            { "core.enforce_variable_description" = "rules/core/enforce_variable_description.md" },
            { "core.file_naming" = "rules/core/file_naming.md" },
            { "core.naming_convention" = "rules/core/naming_convention.md" },
            { "core.required_provider_must_be_declared" = "rules/core/required_provider_must_be_declared.md" }
        ] }
    ] },
    { "Development" = [
        { "Contributing" = "development/index.md" },
        { "Rule Conventions" = "development/rule-conventions.md" },
        { "Release" = "development/release.md" },
        { "Tools" = [
            { "Generate Doc Pages" = "development/tools/gen-docs.md" },
            { "HCL Testing" = "development/tools/hcl-test.md" },
            { "Tools" = "development/tools/index.md" }
        ] }
    ] },
    { "About" = [
        { "Security" = "about/security.md" },
        { "License" = "about/license.md" }
    ] }
]
[project.theme]
variant = "modern"
features = [
    "navigation.indexes",
    "navigation.instant",
    "navigation.tracking",
    "navigation.path",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle = { icon = "material/brightness-auto", name = "Switch to light mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "indigo"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "indigo"
toggle = { icon = "material/brightness-4", name = "Switch to system preference" }

[project.markdown]
extensions = [
    "admonition",
    "codehilite",
    "footnotes",
    "tables"
]

[project.markdown.toc]
permalink = true

[project.plugins]
search = {}
autolinks = {}

[project.plugins.git-revision-date-localized]
fallback_to_build_date = true
